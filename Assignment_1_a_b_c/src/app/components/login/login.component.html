<div class="auth-container">
  <div class="auth-card">
    <div class="card-header">
      <div class="icon-circle">
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4" />
          <polyline points="10 17 15 12 10 7" />
          <line x1="15" y1="12" x2="3" y2="12" />
        </svg>
      </div>
      <h2>Welcome Back</h2>
      <p class="subtitle">Sign in to your account</p>
    </div>

    <div class="alert alert-error" *ngIf="errorMessage">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10" />
        <line x1="15" y1="9" x2="9" y2="15" />
        <line x1="9" y1="9" x2="15" y2="15" />
      </svg>
      {{ errorMessage }}
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="auth-form" novalidate>
      <!-- Email -->
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" formControlName="email" placeholder="e.g. john@example.com"
          [class.input-error]="f['email'].dirty && f['email'].errors"
          [class.input-valid]="f['email'].valid && f['email'].dirty" />
        <div class="field-errors" *ngIf="f['email'].dirty && f['email'].errors">
          <span *ngIf="f['email'].errors['required']">Email is required.</span>
          <span *ngIf="f['email'].errors['email'] || f['email'].errors['pattern']">Please enter a valid email address.</span>
        </div>
      </div>

      <!-- Password -->
      <div class="form-group">
        <label for="password">Password</label>
        <div class="input-wrapper">
          <input [type]="showPassword ? 'text' : 'password'" id="password" formControlName="password"
            placeholder="Enter your password"
            [class.input-error]="f['password'].dirty && f['password'].errors"
            [class.input-valid]="f['password'].valid && f['password'].dirty" />
          <button type="button" class="toggle-pw" (click)="togglePassword()" tabindex="-1">
            <svg *ngIf="!showPassword" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            <svg *ngIf="showPassword" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
          </button>
        </div>
        <div class="field-errors" *ngIf="f['password'].dirty && f['password'].errors">
          <span *ngIf="f['password'].errors['required']">Password is required.</span>
        </div>
      </div>

      <button type="submit" class="btn-primary">Sign In</button>
    </form>

    <p class="auth-link">
      Don\'t have an account? <a routerLink="/register">Create Account</a>
    </p>
  </div>
</div>
