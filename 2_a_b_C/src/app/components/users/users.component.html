<div class="users-container">
  <div class="users-card">
    <div class="users-header">
      <div class="icon-circle">
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" />
          <circle cx="9" cy="7" r="4" />
          <path d="M22 21v-2a4 4 0 0 0-3-3.87" />
          <path d="M16 3.13a4 4 0 0 1 0 7.75" />
        </svg>
      </div>
      <h2>All Registered Users</h2>
      <p class="subtitle">{{ users.length }} user{{ users.length !== 1 ? 's' : '' }} registered</p>
    </div>

    <div class="users-list" *ngIf="users.length > 0">
      <div class="user-row" *ngFor="let user of users; let i = index">
        <div class="user-avatar" [style.background]="'linear-gradient(135deg, hsl(' + (i * 60) + ', 70%, 55%), hsl(' + (i * 60 + 30) + ', 70%, 65%))'">
          {{ getInitials(user.name) }}
        </div>
        <div class="user-info">
          <span class="user-name">{{ user.name }}</span>
          <span class="user-email">&#64;{{ user.username }} &bull; {{ user.email }}</span>
        </div>
        <div class="user-meta">
          <span class="user-phone">{{ user.phone }}</span>
          <span class="user-id">{{ user.city }} &bull; {{ user.gender }}</span>
        </div>
        <button class="btn-delete" (click)="deleteUser(user)" title="Delete user">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3 6 5 6 21 6" />
            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
            <line x1="10" y1="11" x2="10" y2="17" />
            <line x1="14" y1="11" x2="14" y2="17" />
          </svg>
        </button>
      </div>
    </div>

    <div class="empty-state" *ngIf="users.length === 0">
      <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10" />
        <path d="M16 16s-1.5-2-4-2-4 2-4 2" />
        <line x1="9" y1="9" x2="9.01" y2="9" />
        <line x1="15" y1="9" x2="15.01" y2="9" />
      </svg>
      <p>No users registered yet.</p>
      <span>Register a new account to see users here.</span>
    </div>
  </div>
</div>
