<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - LuxeVogue Boutique</title>
    <link rel="stylesheet" href="css/home.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        .auth-container {
            min-height: calc(100vh - 150px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .auth-card {
            background: var(--card);
            border-radius: 16px;
            box-shadow: var(--shadow-lg);
            padding: 3rem;
            width: 100%;
            max-width: 420px;
        }
        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .auth-header h1 {
            font-size: 2rem;
            color: var(--text);
            margin-bottom: 0.5rem;
            font-weight: 700;
        }
        .auth-header p {
            color: var(--muted);
            font-size: 0.95rem;
        }
        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .form-group label {
            font-weight: 600;
            color: var(--text);
            font-size: 0.95rem;
        }
        .form-group input {
            padding: 0.85rem 1rem;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            font-family: inherit;
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.1);
        }
        .form-remember {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.9rem;
        }
        .form-remember input {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
        .btn-primary {
            padding: 0.85rem;
            border: none;
            border-radius: 12px;
            background-color: var(--text);
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            background: linear-gradient(135deg, var(--accent) 0%, #f1c232 100%);
            color: var(--text);
            transform: translateY(-2px);
            box-shadow: var(--shadow);
        }
        .auth-divider {
            display: flex;
            align-items: center;
            margin: 2rem 0;
            gap: 1rem;
        }
        .auth-divider::before,
        .auth-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background-color: #e0e0e0;
        }
        .auth-divider span {
            color: var(--muted);
            font-size: 0.85rem;
            font-weight: 500;
        }
        .social-login {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .social-btn {
            padding: 0.85rem;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            background-color: white;
            color: var(--text);
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            transition: all 0.3s ease;
        }
        .social-btn:hover {
            background-color: var(--bg);
            border-color: var(--accent);
            transform: translateY(-2px);
        }
        .auth-footer {
            text-align: center;
            margin-top: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .auth-footer p {
            font-size: 0.9rem;
            color: var(--muted);
        }
        .register-link, .forgot-password a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }
        .register-link:hover, .forgot-password a:hover {
            color: var(--text);
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container nav-inner">
            <div class="logo"><i class="fas fa-gem"></i><span>LuxeVogue</span></div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="shop.html">Shop</a></li>
                <li><a class="active" href="login.html">Login</a></li>
                <li><a href="cart.html" class="cart-link"><i class="fas fa-shopping-cart"></i><span>Cart</span><span class="cart-count">0</span></a></li>
            </ul>
        </div>
    </nav>

    <main class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1>Welcome Back</h1>
                <p>Sign in to your LuxeVogue account</p>
            </div>

            <form id="loginForm" class="auth-form">
                <div class="form-group">
                    <label for="email">Username</label>
                    <input type="email" id="email" name="email" placeholder="your@email.com" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                </div>

                <div class="form-remember">
                    <input type="checkbox" id="remember" name="remember">
                    <label for="remember">Remember me</label>
                </div>

                <button type="submit" class="btn-primary">Sign In</button>
            </form>

            <div class="auth-divider">
                <span>or</span>
            </div>

            <div class="social-login">
                <button class="social-btn google-btn">
                    <i class="fab fa-google"></i> Sign in with Google
                </button>
                <button class="social-btn facebook-btn">
                    <i class="fab fa-facebook"></i> Sign in with Facebook
                </button>
            </div>

            <div class="auth-footer">
                <p>Don't have an account? <a href="register.html" class="register-link">Create one</a></p>
                <p class="forgot-password"><a href="#forgot">Forgot your password?</a></p>
            </div>
        </div>
    </main>

    <script src="js/auth.js"></script>
</body>
</html>
