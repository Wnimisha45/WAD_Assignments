version: '3.9'

services:
  boutique-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: luxevogue-boutique-store
    ports:
      - "8080:8080"
    environment:
      - SERVER_PORT=8080
      - SPRING_PROFILES_ACTIVE=docker
    volumes:
      - ./css:/app/css
      - ./js:/app/js
      - ./images:/app/images
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
