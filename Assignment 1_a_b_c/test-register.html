<!DOCTYPE html>
<html>
<head>
    <title>Test Register</title>
    <style>
        body { font-family: Arial; max-width: 800px; margin: 50px auto; }
        .test-box { background: #f0f0f0; padding: 20px; border-radius: 8px; margin: 20px 0; }
        .pass { color: green; font-weight: bold; }
        .fail { color: red; font-weight: bold; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Form Validation Test</h1>
    
    <div class="test-box">
        <h2>Test 1: Empty Form Submission</h2>
        <p>Click "Test Submit Empty" - should show ERRORS and NOT submit</p>
        <button onclick="testEmptySubmit()">Test Submit Empty</button>
        <div id="test1Result"></div>
    </div>
    
    <div class="test-box">
        <h2>Actual Register Form</h2>
        <iframe src="register.html" width="100%" height="1200" style="border: 1px solid #ccc;"></iframe>
    </div>

    <script>
        function testEmptySubmit() {
            console.log('🔍 TEST: Checking if register.html form validation works...');
            document.getElementById('test1Result').innerHTML = '<p class="pass">✅ Check browser console (F12) for error messages</p>';
        }
    </script>
</body>
</html>
