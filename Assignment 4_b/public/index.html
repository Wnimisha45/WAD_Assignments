<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Expense Tracker</title>
    <style>
      :root {
        --bg: #f5f7fb;
        --card: #ffffff;
        --text: #1f2a44;
        --muted: #5f6b85;
        --accent: #0f7bff;
        --danger: #d93025;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(140deg, #eef3ff, var(--bg));
        color: var(--text);
      }
      .container {
        max-width: 980px;
        margin: 28px auto;
        padding: 0 16px;
      }
      .grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 16px;
      }
      @media (min-width: 900px) {
        .grid { grid-template-columns: 360px 1fr; }
      }
      .card {
        background: var(--card);
        border-radius: 14px;
        padding: 18px;
        box-shadow: 0 10px 30px rgba(15, 123, 255, 0.08);
      }
      h1 { margin-top: 0; }
      label { display: block; margin: 10px 0 6px; font-size: 14px; }
      input {
        width: 100%;
        padding: 10px;
        border: 1px solid #d9e1f2;
        border-radius: 8px;
      }
      button {
        margin-top: 12px;
        border: none;
        border-radius: 8px;
        padding: 10px 14px;
        background: var(--accent);
        color: #fff;
        font-weight: 600;
        cursor: pointer;
      }
      .summary {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }
      .pill {
        background: #edf4ff;
        padding: 10px;
        border-radius: 8px;
        font-size: 14px;
      }
      .expense {
        border: 1px solid #e8edf7;
        border-radius: 10px;
        padding: 12px;
        margin-bottom: 10px;
      }
      .row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 8px;
      }
      .muted { color: var(--muted); font-size: 13px; }
      .delete {
        background: var(--danger);
        margin-top: 8px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Personal Expense Tracker</h1>
      <p class="muted">Track daily expenses and see your spending summary.</p>
      <div class="grid">
        <section class="card">
          <h2>Add Expense</h2>
          <form id="expenseForm">
            <label>Title</label>
            <input id="title" required placeholder="Groceries" />
            <label>Amount</label>
            <input id="amount" type="number" step="0.01" min="0" required placeholder="450" />
            <label>Category</label>
            <input id="category" required placeholder="Food" />
            <label>Date</label>
            <input id="spentOn" type="date" required />
            <button type="submit">Save Expense</button>
          </form>
        </section>

        <section class="card">
          <h2>Summary</h2>
          <div class="summary" id="summary"></div>
          <h2 style="margin-top: 18px">Recent Expenses</h2>
          <div id="list"></div>
        </section>
      </div>
    </div>

    <script>
      const form = document.getElementById("expenseForm");
      const list = document.getElementById("list");
      const summary = document.getElementById("summary");

      async function loadExpenses() {
        const [expenseRes, summaryRes] = await Promise.all([
          fetch("/api/expenses"),
          fetch("/api/summary"),
        ]);

        const expenseJson = await expenseRes.json();
        const summaryJson = await summaryRes.json();

        renderList(expenseJson.data || []);
        renderSummary(summaryJson.data || { count: 0, totalSpent: 0, byCategory: {} });
      }

      function renderSummary(data) {
        const categories = Object.entries(data.byCategory || {})
          .map(([key, value]) => `<div class="pill">${key}: Rs. ${value.toFixed(2)}</div>`)
          .join("");

        summary.innerHTML = `
          <div class="pill">Total Entries: ${data.count || 0}</div>
          <div class="pill">Total Spent: Rs. ${(data.totalSpent || 0).toFixed(2)}</div>
          ${categories}
        `;
      }

      function renderList(items) {
        if (!items.length) {
          list.innerHTML = "<p class='muted'>No expenses yet.</p>";
          return;
        }

        list.innerHTML = items
          .map(
            (item) => `
              <div class="expense">
                <div class="row"><strong>${item.title}</strong><strong>Rs. ${item.amount.toFixed(2)}</strong></div>
                <div class="muted">${item.category} | ${item.spentOn}</div>
                <button class="delete" onclick="removeExpense('${item.id}')">Delete</button>
              </div>
            `
          )
          .join("");
      }

      async function removeExpense(id) {
        await fetch(`/api/expenses/${id}`, { method: "DELETE" });
        loadExpenses();
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();

        const payload = {
          title: document.getElementById("title").value,
          amount: document.getElementById("amount").value,
          category: document.getElementById("category").value,
          spentOn: document.getElementById("spentOn").value,
        };

        await fetch("/api/expenses", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });

        form.reset();
        loadExpenses();
      });

      loadExpenses();
    </script>
  </body>
</html>
